name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts
        run: pnpm build:contracts

      - name: Build kernel
        run: pnpm build:kernel

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Validate
        run: pnpm validate

      - name: MCP smoke
        run: pnpm mcp:smoke

      - name: Local install smoke
        run: |
          PREFIX="$RUNNER_TEMP/oh-my-pm-local"
          node tools/install-local.mjs --prefix "$PREFIX"
          test ! -e "$PREFIX/bin/oh-my-pm"
          node tools/install-local.mjs --prefix "$PREFIX" --apply
          node tools/check-local-install.mjs --prefix "$PREFIX"
          node tools/print-mcp-client-config.mjs --prefix "$PREFIX" > "$RUNNER_TEMP/oh-my-pm-mcp.json"
          node -e 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"))' "$RUNNER_TEMP/oh-my-pm-mcp.json"

      - name: Portable release bundle smoke
        run: |
          OUT="$RUNNER_TEMP/oh-my-pm-release"
          MOVED="$RUNNER_TEMP/oh-my-pm-release-moved"
          node tools/build-release-bundle.mjs --output "$OUT"
          test ! -e "$OUT/oh-my-pm-v0.1.0"
          node tools/build-release-bundle.mjs --output "$OUT" --apply
          mkdir -p "$MOVED"
          mv "$OUT/oh-my-pm-v0.1.0" "$MOVED/oh-my-pm-v0.1.0"
          node tools/check-release-bundle.mjs --bundle "$MOVED/oh-my-pm-v0.1.0"

      - name: Release archives smoke
        run: |
          BUNDLE_OUT="$RUNNER_TEMP/oh-my-pm-archive-bundle"
          ASSETS="$RUNNER_TEMP/oh-my-pm-archive-assets"
          node tools/build-release-bundle.mjs --output "$BUNDLE_OUT" --apply
          BUNDLE="$BUNDLE_OUT/oh-my-pm-v0.1.0"
          node tools/build-release-archives.mjs --bundle "$BUNDLE" --output "$ASSETS"
          test ! -e "$ASSETS/oh-my-pm-v0.1.0.tar.gz"
          node tools/build-release-archives.mjs --bundle "$BUNDLE" --output "$ASSETS" --apply
          node tools/check-release-archives.mjs --assets "$ASSETS"
          node tools/check-release-archive-reproducibility.mjs --bundle "$BUNDLE"
          test -z "$(git status --porcelain)"
