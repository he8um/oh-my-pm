name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts
        run: pnpm build:contracts

      - name: Build kernel
        run: pnpm build:kernel

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Validate
        run: pnpm validate

      - name: MCP smoke
        run: pnpm mcp:smoke

      - name: Local install smoke
        run: |
          PREFIX="$RUNNER_TEMP/oh-my-pm-local"
          node tools/install-local.mjs --prefix "$PREFIX"
          test ! -e "$PREFIX/bin/oh-my-pm"
          node tools/install-local.mjs --prefix "$PREFIX" --apply
          node tools/check-local-install.mjs --prefix "$PREFIX"
          node tools/print-mcp-client-config.mjs --prefix "$PREFIX" > "$RUNNER_TEMP/oh-my-pm-mcp.json"
          node -e 'JSON.parse(require("node:fs").readFileSync(process.argv[1], "utf8"))' "$RUNNER_TEMP/oh-my-pm-mcp.json"

      - name: Portable release bundle smoke
        run: |
          VERSION="$(node -p "require('./version.json').version")"
          BUNDLE_NAME="oh-my-pm-v$VERSION"
          OUT="$RUNNER_TEMP/oh-my-pm-release"
          MOVED="$RUNNER_TEMP/oh-my-pm-release-moved"
          node tools/build-release-bundle.mjs --output "$OUT"
          test ! -e "$OUT/$BUNDLE_NAME"
          node tools/build-release-bundle.mjs --output "$OUT" --apply
          mkdir -p "$MOVED"
          mv "$OUT/$BUNDLE_NAME" "$MOVED/$BUNDLE_NAME"
          node tools/check-release-bundle.mjs --bundle "$MOVED/$BUNDLE_NAME"

      - name: Release archives smoke
        run: |
          VERSION="$(node -p "require('./version.json').version")"
          BUNDLE_NAME="oh-my-pm-v$VERSION"
          BUNDLE_OUT="$RUNNER_TEMP/oh-my-pm-archive-bundle"
          ASSETS="$RUNNER_TEMP/oh-my-pm-archive-assets"
          node tools/build-release-bundle.mjs --output "$BUNDLE_OUT" --apply
          BUNDLE="$BUNDLE_OUT/$BUNDLE_NAME"
          node tools/build-release-archives.mjs --bundle "$BUNDLE" --output "$ASSETS"
          test ! -e "$ASSETS/$BUNDLE_NAME.tar.gz"
          node tools/build-release-archives.mjs --bundle "$BUNDLE" --output "$ASSETS" --apply
          node tools/check-release-archives.mjs --assets "$ASSETS"
          node tools/check-release-archive-reproducibility.mjs --bundle "$BUNDLE"
          test -z "$(git status --porcelain)"

      - name: Release install smoke
        run: |
          VERSION="$(node -p "require('./version.json').version")"
          BUNDLE_NAME="oh-my-pm-v$VERSION"
          BUILD_OUT="$RUNNER_TEMP/oh-my-pm-install-build"
          BUNDLE_HOME="$RUNNER_TEMP/oh-my-pm-install-bundle"
          PREFIX="$RUNNER_TEMP/oh-my-pm-install-prefix"
          MOVED_PREFIX="$RUNNER_TEMP/oh-my-pm-install-prefix-moved"
          # Build and verify a current bundle, then move it outside the checkout.
          node tools/build-release-bundle.mjs --output "$BUILD_OUT" --apply
          node tools/check-release-bundle.mjs --bundle "$BUILD_OUT/$BUNDLE_NAME"
          mkdir -p "$BUNDLE_HOME"
          mv "$BUILD_OUT/$BUNDLE_NAME" "$BUNDLE_HOME/$BUNDLE_NAME"
          BUNDLE="$BUNDLE_HOME/$BUNDLE_NAME"
          # Preview must create no prefix.
          node "$BUNDLE/bin/oh-my-pm-install.mjs" --prefix "$PREFIX"
          test ! -e "$PREFIX"
          # Apply, verify installed state.
          node "$BUNDLE/bin/oh-my-pm-install.mjs" --prefix "$PREFIX" --apply
          node tools/check-release-install.mjs --prefix "$PREFIX" --expected-version "$VERSION"
          # Remove the source bundle by its exact RUNNER_TEMP child path;
          # installed CLI must still work. (Never delete $RUNNER_TEMP itself or
          # an inferred parent.)
          rm -rf "$BUNDLE_HOME"
          "$PREFIX/bin/oh-my-pm" status
          # Move the whole prefix to another exact RUNNER_TEMP child; relative
          # shims must still work. $RUNNER_TEMP already exists, so no parent is
          # created or inferred.
          mv "$PREFIX" "$MOVED_PREFIX"
          "$MOVED_PREFIX/bin/oh-my-pm" status
          node tools/check-release-install.mjs --prefix "$MOVED_PREFIX" --expected-version "$VERSION"
          test -z "$(git status --porcelain)"

  windows-release-install:
    name: Windows release install smoke
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4.4.0
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts
        run: pnpm build:contracts

      - name: Build kernel
        run: pnpm build:kernel

      - name: Build
        run: pnpm build

      - name: Release install smoke via .cmd shims
        shell: pwsh
        run: |
          function Assert-RunnerTempChild([string]$Path) {
            $runner = [System.IO.Path]::GetFullPath($env:RUNNER_TEMP)
            $target = [System.IO.Path]::GetFullPath($Path)
            if (-not $target.StartsWith($runner + [System.IO.Path]::DirectorySeparatorChar)) {
              throw "unsafe temporary path: $target"
            }
          }
          $version = node -p "require('./version.json').version"
          $bundleName = "oh-my-pm-v$version"
          $buildOut = Join-Path $env:RUNNER_TEMP "omp-install-build"
          $prefix = Join-Path $env:RUNNER_TEMP "omp-install-prefix"
          $movedPrefix = Join-Path $env:RUNNER_TEMP "omp-install-prefix-moved"
          # Every generated/deleted/moved path must be an exact descendant of
          # RUNNER_TEMP.
          Assert-RunnerTempChild $buildOut
          Assert-RunnerTempChild $prefix
          Assert-RunnerTempChild $movedPrefix
          # The relocation target must not pre-exist.
          if (Test-Path -LiteralPath $movedPrefix) { throw "moved prefix already exists" }
          # Native (node) failures do not stop pwsh mid-script, so every step's
          # exit code is checked explicitly to surface a failure at its source.
          node tools/build-release-bundle.mjs --output $buildOut --apply
          if ($LASTEXITCODE -ne 0) { throw "bundle build failed" }
          $bundle = Join-Path $buildOut $bundleName
          node tools/check-release-bundle.mjs --bundle $bundle
          if ($LASTEXITCODE -ne 0) { throw "bundle verification failed" }
          # The complete generated Kernel binding must be present (this is the
          # exact set that Windows pnpm deploy previously omitted).
          $generated = Join-Path $bundle "node_modules/@oh-my-pm/kernel/generated-node"
          foreach ($asset in @("oh_my_pm_kernel.js", "oh_my_pm_kernel_bg.wasm", "package.json")) {
            $assetPath = Join-Path $generated $asset
            if (-not (Test-Path $assetPath)) { throw "missing generated kernel asset: $assetPath" }
          }
          # The bundled CLI must load the real Kernel and report status.
          node (Join-Path $bundle "bin/oh-my-pm.mjs") status
          if ($LASTEXITCODE -ne 0) { throw "bundled CLI status failed" }
          $installer = Join-Path $bundle "bin/oh-my-pm-install.mjs"
          if (-not (Test-Path $installer)) { throw "missing bundled installer: $installer" }
          # Preview must create no prefix.
          node $installer --prefix $prefix
          if ($LASTEXITCODE -ne 0) { throw "installer preview failed" }
          if (Test-Path $prefix) { throw "preview created a prefix" }
          # Apply and verify the four shims, including the .cmd shims, exist.
          # Capture stderr so a failure surfaces the installer's bounded,
          # path-free reason codes (e.g. post_install_verification_failed,
          # post_posix_shim_mode_mismatch) that pinpoint the failing subsystem.
          $applyErr = Join-Path $env:RUNNER_TEMP "omp-install-apply.err"
          node $installer --prefix $prefix --apply 2> $applyErr
          $applyExit = $LASTEXITCODE
          if (Test-Path $applyErr) { Get-Content $applyErr | Write-Host }
          if ($applyExit -ne 0) { throw "installer apply failed" }
          foreach ($shim in @("oh-my-pm", "oh-my-pm.cmd", "oh-my-pm-mcp", "oh-my-pm-mcp.cmd")) {
            $path = Join-Path $prefix (Join-Path "bin" $shim)
            if (-not (Test-Path $path)) { throw "missing shim: $path" }
          }
          # Installed CLI status through the .cmd shim.
          & (Join-Path $prefix "bin/oh-my-pm.cmd") status
          if ($LASTEXITCODE -ne 0) { throw "installed CLI .cmd status failed" }
          # Installed MCP entrypoint availability (resolves without launching).
          $mcpTarget = Join-Path $prefix (Join-Path "lib" (Join-Path "oh-my-pm" (Join-Path "versions" (Join-Path $version (Join-Path "bin" "oh-my-pm-mcp.mjs")))))
          if (-not (Test-Path $mcpTarget)) { throw "installed MCP entrypoint missing: $mcpTarget" }
          # Full read-only installed-state verification.
          node tools/check-release-install.mjs --prefix $prefix --expected-version $version
          if ($LASTEXITCODE -ne 0) { throw "installed-state verification failed" }
          # Source-bundle independence: remove ONLY the exact bundle-build
          # directory (validated as a RUNNER_TEMP child), then prove the installed
          # CLI and the full installed-state checker (CLI workflows + MCP) still
          # work. This catches any dependency on the extracted bundle, junctions
          # back to it, or assets that were not copied into the version directory.
          Assert-RunnerTempChild $buildOut
          Remove-Item -LiteralPath $buildOut -Recurse -Force
          if (Test-Path -LiteralPath $buildOut) { throw "source bundle removal failed" }
          & (Join-Path $prefix "bin/oh-my-pm.cmd") status
          if ($LASTEXITCODE -ne 0) { throw "installed CLI failed after source bundle removal" }
          node tools/check-release-install.mjs --prefix $prefix --expected-version $version
          if ($LASTEXITCODE -ne 0) { throw "installed-state verification failed after source bundle removal" }
          # Prefix relocation: move the complete installed prefix to another exact
          # RUNNER_TEMP child, then prove the relocated .cmd shim and the full
          # installed-state checker (CLI workflows + MCP) still work. This catches
          # hard-coded absolute prefix paths, non-relocatable shims, absolute
          # Windows junctions, and manifests/imports tied to the original location.
          if (Test-Path -LiteralPath $movedPrefix) { throw "moved prefix already exists" }
          Move-Item -LiteralPath $prefix -Destination $movedPrefix
          if (Test-Path -LiteralPath $prefix) { throw "original prefix still exists after relocation" }
          if (-not (Test-Path -LiteralPath $movedPrefix)) { throw "relocated prefix is missing" }
          & (Join-Path $movedPrefix "bin/oh-my-pm.cmd") status
          if ($LASTEXITCODE -ne 0) { throw "relocated installed CLI .cmd status failed" }
          node tools/check-release-install.mjs --prefix $movedPrefix --expected-version $version
          if ($LASTEXITCODE -ne 0) { throw "relocated installed-state verification failed" }
