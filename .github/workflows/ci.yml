name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy, rustfmt

      - name: Install wasm-bindgen CLI
        run: cargo install wasm-bindgen-cli --version 0.2.126 --locked

      - name: Install dependencies
        run: pnpm install

      - name: Build contracts
        run: pnpm build:contracts

      - name: Build kernel
        run: pnpm build:kernel

      - name: Build
        run: pnpm build

      - name: Test
        run: pnpm test

      - name: Validate
        run: pnpm validate

      - name: MCP smoke
        run: pnpm mcp:smoke
